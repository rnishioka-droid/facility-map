<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>施設マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
html,body{height:100%;margin:0;}
#map{position:absolute;top:0;bottom:0;width:100%;}
#filter{position:absolute;top:10px;left:10px;background:#fff;padding:10px;z-index:1000;border-radius:8px;font-size:12px;width:240px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.color-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;}
</style>
</head>

<body>

<div id="map"></div>

<div id="filter">

<input id="address" placeholder="住所 or 駅" style="width:100%"><br><br>

<select id="mode" onchange="updateDistanceOptions()">
<option value="distance">距離</option>
<option value="drive">車</option>
<option value="train">電車</option>
</select><br><br>

<select id="distance"></select>
<span id="unit">km</span><br><br>

<label><input type="checkbox" id="circleToggle" checked> 円表示</label><br><br>

<div class="grid">
<label><span class="color-dot" style="background:red"></span><input type="checkbox" value="特養" checked>特養</label>
<label><span class="color-dot" style="background:blue"></span><input type="checkbox" value="老健" checked>老健</label>
<label><span class="color-dot" style="background:green"></span><input type="checkbox" value="有料" checked>有料</label>
<label><span class="color-dot" style="background:orange"></span><input type="checkbox" value="サ高住" checked>サ高住</label>
<label><span class="color-dot" style="background:violet"></span><input type="checkbox" value="GH" checked>GH</label>
<label><span class="color-dot" style="background:grey"></span><input type="checkbox" value="デイ" checked>デイ</label>
<label><span class="color-dot" style="background:black"></span><input type="checkbox" value="病院" checked>病院</label>
<label><span class="color-dot" style="background:green"></span><input type="checkbox" value="訪問介護" checked>訪問介護</label>
</div><br>

<button onclick="search()">検索</button>
<button onclick="exportFaxCSV()">FAX用CSV</button>
<button onclick="exportDetailCSV()">確認用CSV</button>

<div id="count">件数:0</div>

</div>

<script>

const map=L.map('map').setView([35.735,139.715],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const markers=L.markerClusterGroup().addTo(map);
const allMarkers=[];

let currentResults=[];
let centerLat=0;
let centerLng=0;
let centerMarker=null;
let currentCircle=null;

function updateDistanceOptions(){
const mode=document.getElementById("mode").value;
const select=document.getElementById("distance");
const unit=document.getElementById("unit");

select.innerHTML="";

if(mode==="distance"){
unit.innerText="km";
[1,3,5,10,15,20,25,30].forEach(v=>{
const o=new Option(v,v);
if(v===5)o.selected=true;
select.add(o);
});
}else{
unit.innerText="分";
for(let v=5; v<=60; v+=5){
const o=new Option(v,v);
if(v===30)o.selected=true;
select.add(o);
}
}
}
updateDistanceOptions();

function getColor(c){
if(!c)return"blue";
c=c.replace(/\s/g,"");
if(c.includes("特養"))return"red";
if(c.includes("老健"))return"blue";
if(c.includes("有料"))return"green";
if(c.includes("サ高住"))return"orange";
if(c.includes("GH"))return"violet";
if(c.includes("デイ"))return"grey";
if(c.includes("病院"))return"black";
if(c.includes("訪問介護"))return"green"; // 色分離
return"blue";
}

function createIcon(color){
return L.icon({
iconUrl:"https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-"+color+".png",
shadowUrl:"https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png",
iconSize:[25,41],
iconAnchor:[12,41]
});
}

function getDistance(a,b,c,d){
const R=6371;
const dLat=(c-a)*Math.PI/180;
const dLng=(d-b)*Math.PI/180;
const x=Math.sin(dLat/2)**2+
Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
Math.sin(dLng/2)**2;
return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

Papa.parse("data.csv",{
download:true,
header:true,
skipEmptyLines:true,
complete:function(res){
res.data.forEach(row=>{
const lat=parseFloat(row.lat);
const lng=parseFloat(row.lng);
const cat=row.category||"";

if(!isNaN(lat)&&!isNaN(lng)){
const url=row.url?`<a href="${row.url}" target="_blank">サイト</a>`:"";

const m=L.marker([lat,lng],{
icon:createIcon(getColor(cat))
}).bindPopup(
`<b>${row.name}</b><br>
区分:${cat}<br>
会社:${row.company}<br>
住所:${row.address}<br>
TEL:${row.phone}<br>
FAX:${row.fax}<br>
${url}`
);

m.lat=lat;
m.lng=lng;
m.category=cat;
m.data=row;

allMarkers.push(m);
}
});
}
});

async function search(){

const addr=document.getElementById("address").value.trim();
const limit=parseFloat(document.getElementById("distance").value);
const mode=document.getElementById("mode").value;
const showCircle=document.getElementById("circleToggle").checked;

const res=await fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&q="+encodeURIComponent(addr));
const data=await res.json();

if(!data.length){alert("見つからない");return;}

centerLat=parseFloat(data[0].lat);
centerLng=parseFloat(data[0].lon);

map.setView([centerLat,centerLng],13);

// ★起点ピン修正
if(centerMarker)map.removeLayer(centerMarker);
centerMarker=L.marker([centerLat,centerLng],{
icon:createIcon("red")
}).addTo(map).bindPopup("検索地点").openPopup();

if(currentCircle){map.removeLayer(currentCircle);currentCircle=null;}

if(showCircle && mode==="distance"){
currentCircle=L.circle([centerLat,centerLng],{
radius:limit*1000,color:"blue",fillOpacity:0.1
}).addTo(map);
}

markers.clearLayers();
currentResults=[];

const checked=[...document.querySelectorAll("#filter input:checked")].map(e=>e.value);

let count=0;

for(const m of allMarkers){

let ok=false;
const dist=getDistance(centerLat,centerLng,m.lat,m.lng);

if(mode==="distance") ok=dist<=limit;
if(mode==="drive") ok=(dist*2)<=limit;
if(mode==="train") ok=(dist*3)<=limit;

if(ok && checked.some(c=>m.category.includes(c))){
markers.addLayer(m);
currentResults.push(m);
count++;
}
}

document.getElementById("count").innerText="件数:"+count;
}

function exportFaxCSV(){
let csv="name,category,company,fax,distance_km\n";
currentResults.forEach(m=>{
const r=m.data;
const d=getDistance(centerLat,centerLng,m.lat,m.lng).toFixed(2);
if(r.fax){
csv+=`${r.name},${m.category},${r.company},${r.fax},${d}\n`;
}
});
const blob=new Blob(["\uFEFF"+csv]);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="fax.csv";
a.click();
}

function exportDetailCSV(){
let csv="name,category,company,phone,fax,distance_km\n";
currentResults.forEach(m=>{
const r=m.data;
const d=getDistance(centerLat,centerLng,m.lat,m.lng).toFixed(2);
csv+=`${r.name},${m.category},${r.company},${r.phone},${r.fax},${d}\n`;
});
const blob=new Blob(["\uFEFF"+csv]);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="detail.csv";
a.click();
}

</script>

</body>
</html>
